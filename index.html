<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pistachio Market Insights</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1"></script>
</head>
<body>

  <div class="page">

    <h1 class="page-title">Pistachio Market Insights</h1>

    <!-- SELECTOR SUPERIOR -->
    <div class="top-selector">
      <div class="ticker active" data-pair="USDLB_STD" data-name="Std. Size USX1 USD/LB FAS Calif.">
        <div class="label"></div>
        <div class="delta"></div>
      </div>

      <div class="ticker" data-pair="USDLB_LARGE" data-name="Large Size USD/LB">
        <div class="label"></div>
        <div class="delta"></div>
      </div>
    </div>

    <!-- PRECIO -->
    <div class="price-header">
      <div id="productTitle" class="product-title"></div>
      <div class="price-row">
        <span id="productPrice" class="price"></span>
        <span id="productChange" class="change"></span>
      </div>
    </div>

    <!-- RANGOS -->
    <div class="ranges">
      <button data-range="7">1W</button>
      <button data-range="30">1M</button>
      <button data-range="365">1Y</button>
      <button data-range="all" class="active">ALL</button>
    </div>

    <!-- GRÁFICO -->
    <div class="chart-container">
      <canvas id="currencyChart"></canvas>
    </div>

    <!-- FOOTER -->
    <footer>
      © 2026 Pistachio Market Insights · Data FAS California
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
